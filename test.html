<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ</title>
  <link rel="stylesheet" href="test.css">
</head>
<body>

<div class="container">
  <header>
    <h2>世界一甘いお店</h2>
  </header>

  <div class="content-wrapper">
    <nav class="sidebar">
      <ul>
        <li><a href="#section1">トップ</a></li>
        <li><a href="#section2">新着情報</a></li>
        <li><a href="#section3">おすすめのスイーツ</a></li>
        <li><a href="#section4">お問い合わせ</a></li>
      </ul>
    </nav>

    <main>
      <form>
        <table border="4px" cellpadding="0">
          <tr>
            <th>お名前</th>
            <td>
              <input type="text" size="40">
            </td>
          </tr>
          <tr>
            <th>お近くのお店</th>
            <td>
              <select name="example">
                <option value="1">北海道・東北</option>
                <option value="2">関東</option>
                <option value="3">中部</option>
                <option value="4">関西</option>
                <option value="5">中国・四国</option>
                <option value="6">九州・沖縄</option>
              </select>
            </td>
          </tr>
          <tr>
            <th>電話</th>
            <td>
              <input type="text" size="40">
            </td>
          </tr>
          <tr>
            <th>電話番号</th>
            <td>
              <input type="tel" size="40">
            </td>
          </tr>
          <tr>
            <th>メールアドレス</th>
            <td>
              <input type="email" size="40">
            </td>
          </tr>
          <tr>
            <th>お問い合わせ種別</th>
            <td>
              <label>
                <input type="radio" name="inquiry" value="product">
                商品について
              </label>
              <label>
                <input type="radio" name="inquiry" value="staff">
                従業員について
              </label>
            </td>
          </tr>
          <tr>
            <th>お問い合わせ内容</th>
            <td>
              <textarea cols="30" rows="5" placeholder="詳細を入力してください"></textarea>
            </td>
          </tr>
        </table>
        <div class="submit-area">
          <button type="submit">送信</button>
        </div>
      </form>
    </main>
  </div>
    <footer>

    </footer>
</body>
</html>
